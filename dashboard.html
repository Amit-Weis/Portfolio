<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Analytics – Amit Weis</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ── Scatter / line chart ── */
      .dash-scatter-wrap {
        position: relative;
        width: 100%;
        overflow: hidden;
      }
      .dash-scatter-svg {
        width: 100%;
        display: block;
      }
      .scatter-axis-label {
        font-size: 11px;
        fill: #555;
        font-family: inherit;
      }
      .scatter-grid-line {
        stroke: rgba(255, 255, 255, 0.06);
        stroke-width: 1;
      }
      .scatter-line {
        fill: none;
        stroke-width: 2;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
      .scatter-line--human {
        stroke: #4a9eff;
      }
      .scatter-line--bot {
        stroke: #ff5c5c;
        stroke-dasharray: 5 4;
        opacity: 0.7;
      }
      .scatter-dot {
        transition: r 0.15s;
        cursor: default;
      }
      .scatter-dot--human {
        fill: #4a9eff;
      }
      .scatter-dot--bot {
        fill: #ff5c5c;
      }
      .scatter-dot:hover {
        r: 6;
      }

      /* SVG tooltip */
      .scatter-tooltip {
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .scatter-tooltip rect {
        fill: #1a1f2e;
        rx: 4;
        stroke: rgba(255, 255, 255, 0.1);
        stroke-width: 1;
      }
      .scatter-tooltip text {
        font-size: 11px;
        fill: #e0e0e0;
        font-family: inherit;
      }

      /* ── Wipe button ── */
      .dash-wipe-btn {
        background: transparent;
        border: 1px solid rgba(255, 92, 92, 0.4);
        color: #ff5c5c;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        padding: 0.35rem 0.85rem;
        border-radius: 4px;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s;
        margin-top: 2.5rem;
        display: inline-block;
      }
      .dash-wipe-btn:hover {
        background: rgba(255, 92, 92, 0.12);
        border-color: #ff5c5c;
      }
      .dash-wipe-status {
        font-size: 0.75rem;
        margin-left: 0.75rem;
        opacity: 0.7;
      }
    </style>
  </head>
  <body class="main dashboard">
    <!-- Login -->
    <div id="login-screen" class="dash-login">
      <input
        type="password"
        id="token-input"
        class="dash-input"
        placeholder="dashboard secret"
      />
      <button class="resume-button dash-login-btn" onclick="loadDashboard()">
        <span class="resume-button-text">→</span>
      </button>
      <div class="dash-error" id="login-error"></div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dash-wrap" style="display: none">
      <div class="main-hero" style="padding-top: 2rem">
        <h1 class="pretitle" style="font-size: 1rem; line-height: 2rem">
          analytics
        </h1>

        <!-- Summary Cards -->
        <div class="dash-grid" id="summary-cards"></div>

        <!-- Scatter + Line Chart -->
        <div class="dash-section">
          <div class="dash-section-title">visits — last 30 days</div>
          <div class="dash-chart-wrap">
            <div class="dash-legend">
              <div class="dash-legend-item">
                <div class="dash-legend-dot dash-legend-dot--human"></div>
                human
              </div>
              <div class="dash-legend-item">
                <div class="dash-legend-dot dash-legend-dot--bot"></div>
                bot / scraper
              </div>
            </div>
            <div class="dash-scatter-wrap">
              <svg id="scatter-svg" class="dash-scatter-svg"></svg>
            </div>
          </div>
        </div>

        <!-- Projects -->
        <div class="dash-section">
          <div class="dash-section-title">portfolio items expanded</div>
          <div class="portfolio-item" id="projects-chart"></div>
        </div>

        <!-- Regions (was Timezones) -->
        <div class="dash-section">
          <div class="dash-section-title">regions (top 20)</div>
          <div class="portfolio-item" id="regions-list"></div>
        </div>

        <!-- Wipe Data -->
        <div class="dash-section" style="padding-bottom: 3rem">
          <button class="dash-wipe-btn" onclick="wipeData()">
            wipe all data
          </button>
          <span class="dash-wipe-status" id="wipe-status"></span>
        </div>
      </div>
    </div>

    <script>
      let _secret = "";

      function loadDashboard() {
        _secret = document.getElementById("token-input").value.trim();
        if (!_secret) return;

        fetch(`/api/analytics-data?token=${encodeURIComponent(_secret)}`)
          .then((r) => {
            if (r.status === 401) throw new Error("bad token");
            if (!r.ok) throw new Error("server error");
            return r.json();
          })
          .then(render)
          .catch((e) => {
            document.getElementById("login-error").textContent =
              e.message === "bad token"
                ? "wrong password"
                : `error: ${e.message}`;
            console.error("Dashboard load error:", e);
          });
      }

      document
        .getElementById("token-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") loadDashboard();
        });

      // ── Wipe ──────────────────────────────────────────────────────
      async function wipeData() {
        if (
          !confirm("Wipe ALL analytics data from Redis? This cannot be undone.")
        )
          return;
        const statusEl = document.getElementById("wipe-status");
        statusEl.textContent = "wiping…";
        try {
          const res = await fetch(
            `/api/analytics?wipe=1&token=${encodeURIComponent(_secret)}`,
            { method: "POST" },
          );
          if (res.status === 401) throw new Error("unauthorized");
          if (!res.ok) throw new Error("server error");
          statusEl.textContent = "✓ data wiped";
          setTimeout(() => (statusEl.textContent = ""), 3000);
        } catch (e) {
          statusEl.textContent = `✗ ${e.message}`;
        }
      }

      // ── Scatter + line chart ──────────────────────────────────────
      function buildScatterChart(daily) {
        const svg = document.getElementById("scatter-svg");
        const W = svg.parentElement.offsetWidth || 800;
        const H = 220;
        const PAD = { top: 16, right: 20, bottom: 32, left: 32 };
        const innerW = W - PAD.left - PAD.right;
        const innerH = H - PAD.top - PAD.bottom;

        const humanData = daily.map((d) => parseInt(d.human || 0));
        const botData = daily.map((d) => parseInt(d.bot || 0));
        const maxVal = Math.max(...humanData, ...botData, 1);
        const n = daily.length;

        const xScale = (i) => PAD.left + (i / (n - 1)) * innerW;
        const yScale = (v) => PAD.top + innerH - (v / maxVal) * innerH;

        // Y grid lines
        const gridCount = 4;
        let gridHTML = "";
        for (let g = 0; g <= gridCount; g++) {
          const yVal = (g / gridCount) * maxVal;
          const cy = yScale(yVal);
          gridHTML += `<line class="scatter-grid-line" x1="${PAD.left}" y1="${cy}" x2="${PAD.left + innerW}" y2="${cy}"/>`;
          gridHTML += `<text class="scatter-axis-label" x="${PAD.left - 6}" y="${cy + 4}" text-anchor="end">${Math.round(yVal)}</text>`;
        }

        // Paths
        const makePath = (data) =>
          data
            .map(
              (v, i) =>
                `${i === 0 ? "M" : "L"}${xScale(i).toFixed(1)},${yScale(v).toFixed(1)}`,
            )
            .join(" ");

        // X axis labels — show ~7 evenly spaced dates
        const labelStep = Math.max(1, Math.floor(n / 7));
        let xLabels = "";
        for (let i = 0; i < n; i += labelStep) {
          const d = daily[i].date.slice(5); // MM-DD
          xLabels += `<text class="scatter-axis-label" x="${xScale(i).toFixed(1)}" y="${H - 6}" text-anchor="middle">${d}</text>`;
        }
        // Always show last label
        const lastDate = daily[n - 1].date.slice(5);
        xLabels += `<text class="scatter-axis-label" x="${xScale(n - 1).toFixed(1)}" y="${H - 6}" text-anchor="middle">${lastDate}</text>`;

        // Dots with embedded tooltip data
        const makeDots = (data, cls, labelPrefix) =>
          data
            .map(
              (v, i) =>
                `<circle class="scatter-dot ${cls}" cx="${xScale(i).toFixed(1)}" cy="${yScale(v).toFixed(1)}" r="4"
                  data-label="${daily[i].date}: ${v} ${labelPrefix}"
                  onmouseenter="showTip(evt, this)" onmouseleave="hideTip()"/>`,
            )
            .join("");

        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        svg.setAttribute("height", H);

        svg.innerHTML = `
          <g class="grid">${gridHTML}</g>
          <path class="scatter-line scatter-line--human" d="${makePath(humanData)}"/>
          <path class="scatter-line scatter-line--bot"   d="${makePath(botData)}"/>
          <g class="dots-bot">  ${makeDots(botData, "scatter-dot--bot", "bot")}</g>
          <g class="dots-human">${makeDots(humanData, "scatter-dot--human", "human")}</g>
          ${xLabels}
          <g id="svgTooltip" class="scatter-tooltip">
            <rect id="svgTipRect" x="0" y="0" width="120" height="32" rx="4"/>
            <text id="svgTipText" x="8" y="20"></text>
          </g>
        `;
      }

      function showTip(evt, el) {
        const svg = document.getElementById("scatter-svg");
        const tip = document.getElementById("svgTooltip");
        const rect = document.getElementById("svgTipRect");
        const textEl = document.getElementById("svgTipText");
        const label = el.getAttribute("data-label");
        textEl.textContent = label;

        // Measure text width
        const approxW = label.length * 7 + 16;
        rect.setAttribute("width", approxW);

        const svgRect = svg.getBoundingClientRect();
        const cx = parseFloat(el.getAttribute("cx"));
        const cy = parseFloat(el.getAttribute("cy"));
        const vbW = parseFloat(svg.getAttribute("viewBox").split(" ")[2]);
        const scaleX = vbW / svgRect.width;

        let tx = cx + 8;
        if (tx + approxW * scaleX > vbW) tx = cx - approxW - 8;

        tip.setAttribute("transform", `translate(${tx}, ${cy - 36})`);
        tip.style.opacity = "1";
      }

      function hideTip() {
        document.getElementById("svgTooltip").style.opacity = "0";
      }

      // ── Main render ───────────────────────────────────────────────
      function render(data) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        const { totals, projectClicks, regions, avgTimeOnPage, daily } = data;
        window._cachedDaily = daily;

        const human = parseInt(totals.human || 0);
        const bot = parseInt(totals.bot || 0);
        const total = human + bot;
        const humanPct = total ? Math.round((human / total) * 100) : 0;
        const resumes = parseInt(totals.resume_downloads || 0);

        const cards = [
          {
            label: "total visits",
            value: total.toLocaleString(),
            sub: "all time",
          },
          {
            label: "human visits",
            value: human.toLocaleString(),
            sub: `${humanPct}% of total`,
            accent: true,
          },
          {
            label: "bot / scraper",
            value: bot.toLocaleString(),
            sub: `${100 - humanPct}% of total`,
            danger: true,
          },
          {
            label: "resume downloads",
            value: resumes.toLocaleString(),
            sub: "all time",
          },
          {
            label: "avg active time",
            value: `${avgTimeOnPage}s`,
            sub: "active tab only",
          },
        ];

        document.getElementById("summary-cards").innerHTML = cards
          .map(
            (c) => `
            <div class="dash-card${c.accent ? " dash-card--accent" : c.danger ? " dash-card--danger" : ""}">
              <div class="dash-card-label">${c.label}</div>
              <div class="dash-card-value">${c.value}</div>
              <div class="dash-card-sub">${c.sub}</div>
            </div>`,
          )
          .join("");

        // Chart (defer one frame so width is known)
        requestAnimationFrame(() => buildScatterChart(daily));

        const maxP = Math.max(...projectClicks.map((p) => p.count), 1);
        document.getElementById("projects-chart").innerHTML =
          projectClicks.length === 0
            ? '<span class="dash-empty">no project expansions yet</span>'
            : projectClicks
                .map(
                  (p) => `
                <div class="dash-hbar-row">
                  <div class="dash-hbar-label">${p.name}</div>
                  <div class="dash-hbar-track"><div class="dash-hbar-fill" style="width:${Math.round((p.count / maxP) * 100)}%"></div></div>
                  <div class="dash-hbar-count">${p.count}</div>
                </div>`,
                )
                .join("");

        document.getElementById("regions-list").innerHTML =
          regions.length === 0
            ? '<span class="dash-empty">no region data yet</span>'
            : `<div class="dash-tz-list">${regions
                .map(
                  (r) =>
                    `<div class="dash-tz-item"><span class="dash-tz-name">${r.name}</span><span>${r.count}</span></div>`,
                )
                .join("")}</div>`;
      }

      // Redraw chart on resize
      window.addEventListener("resize", () => {
        if (window._cachedDaily) buildScatterChart(window._cachedDaily);
      });
    </script>
  </body>
</html>
